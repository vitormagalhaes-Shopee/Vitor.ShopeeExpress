<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopee Express | Fleet Analytics Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f3f4f6; }
        .shopee-orange { color: #ee4d2d; }
        .bg-shopee-orange { background-color: #ee4d2d; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .gradient-header { background: linear-gradient(135deg, #1f2937 0%, #111827 100%); }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #ee4d2d; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Fix para evitar que os gráficos sumam ou dancem na tela */
        .chart-container { position: relative; height: 350px; width: 100%; }
        .filter-input { @apply block w-full px-4 py-3 bg-white border border-gray-200 rounded-2xl text-sm font-semibold focus:ring-2 focus:ring-orange-500 focus:outline-none transition-all; }
        .label-style { @apply text-[12px] font-extrabold text-slate-500 uppercase tracking-widest mb-2 block ml-1; }
    </style>
</head>
<body class="text-slate-900">

    <div id="loading" class="fixed inset-0 z-[100] flex items-center justify-center bg-white">
        <div class="text-center">
            <div class="loader mx-auto mb-4"></div>
            <p class="font-bold text-slate-400 animate-pulse uppercase tracking-widest">Estabilizando Visualizações...</p>
        </div>
    </div>

    <header class="gradient-header text-white py-6 px-10 sticky top-0 z-50 border-b-4 border-orange-600 shadow-2xl">
        <div class="max-w-[1700px] mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-5">
                <div class="bg-white p-3 rounded-2xl rotate-3 shadow-lg">
                    <svg width="35" height="35" viewBox="0 0 24 24" fill="#ee4d2d"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zM6 18c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm12 0c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1z"/></svg>
                </div>
                <div>
                    <h1 class="text-3xl font-extrabold tracking-tighter italic">SHOPEE <span class="text-orange-500 not-italic font-light">EXPRESS</span></h1>
                    <p class="text-[10px] text-gray-400 uppercase tracking-[0.2em] font-bold">Fleet Analytics Intelligence</p>
                </div>
            </div>
            <div class="bg-white/5 p-4 rounded-2xl border border-white/10">
                <div class="flex items-center gap-2">
                    <div class="w-2.5 h-2.5 bg-green-500 rounded-full animate-pulse"></div>
                    <span class="text-xs font-black uppercase tracking-widest" id="update-text">Sistema Estável</span>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-[1700px] mx-auto p-8 space-y-10">
        
        <section class="bg-white rounded-[32px] p-8 card-shadow border border-gray-100 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-2 h-full bg-orange-500"></div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-6 gap-6">
                <div>
                    <label class="label-style">Início</label>
                    <input type="date" id="date-start" class="filter-input">
                </div>
                <div>
                    <label class="label-style">Término</label>
                    <input type="date" id="date-end" class="filter-input">
                </div>
                <div>
                    <label class="label-style">Hub Unidade</label>
                    <select id="f-hub" class="filter-input"><option value="all">Todos os Hubs</option></select>
                </div>
                <div>
                    <label class="label-style">Transportadora</label>
                    <select id="f-carrier" class="filter-input"><option value="all">Todas as 3PLs</option></select>
                </div>
                <div>
                    <label class="label-style">Perfil Veículo</label>
                    <select id="f-profile" class="filter-input"><option value="all">Todos Perfis</option></select>
                </div>
                <div class="flex items-end">
                    <button onclick="location.reload()" class="w-full py-3 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold rounded-2xl transition-all text-xs uppercase tracking-widest">Resetar</button>
                </div>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-8 space-y-8">
                <div class="bg-white p-10 rounded-[40px] card-shadow">
                    <h4 class="font-extrabold text-slate-800 uppercase tracking-tighter mb-8 text-xl italic border-l-4 border-orange-500 pl-4">Evolução Diária da Frota</h4>
                    <div class="chart-container">
                        <canvas id="chartEvolucao"></canvas>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="bg-white p-8 rounded-[40px] card-shadow">
                        <h4 class="font-extrabold text-slate-800 uppercase tracking-tighter mb-6">Volume por HUB</h4>
                        <div class="chart-container" style="height: 300px;">
                            <canvas id="chartHub"></canvas>
                        </div>
                    </div>
                    <div class="bg-white p-8 rounded-[40px] card-shadow">
                        <h4 class="font-extrabold text-slate-800 uppercase tracking-tighter mb-6">Performance 3PL</h4>
                        <div class="chart-container" style="height: 300px;">
                            <canvas id="chartCarrier"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-4 space-y-8">
                <div class="bg-shopee-orange p-10 rounded-[40px] text-white card-shadow">
                    <p class="text-xs font-black uppercase opacity-80 mb-2 tracking-widest">Frota Total Ativa</p>
                    <h3 id="kpi-total" class="text-7xl font-black italic">0</h3>
                </div>

                <div class="bg-white p-10 rounded-[40px] card-shadow">
                    <h4 class="font-extrabold text-slate-800 uppercase tracking-tighter mb-8 text-center text-lg italic">Mix de Veículos (% e Qtd)</h4>
                    <div class="chart-container" style="height: 400px;">
                        <canvas id="chartPerfis"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-[40px] card-shadow overflow-hidden mb-20">
            <div class="p-10 border-b border-gray-50 flex flex-col md:flex-row justify-between items-center bg-slate-50/50 gap-4">
                <h4 class="font-extrabold text-slate-800 uppercase tracking-tighter text-xl">Logs Detalhados</h4>
                <input type="text" id="mainSearch" placeholder="🔍 Filtrar..." class="filter-input md:w-80">
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-slate-400 text-[11px] font-black uppercase tracking-widest border-b">
                            <th class="px-10 py-6">Data</th>
                            <th class="px-10 py-6">HUB</th>
                            <th class="px-10 py-6">Transportadora</th>
                            <th class="px-10 py-6">Perfil</th>
                            <th class="px-10 py-6 text-right">Qtd</th>
                        </tr>
                    </thead>
                    <tbody id="fleetTableBody" class="divide-y divide-gray-100 font-bold text-slate-600 italic"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // CONFIGURAÇÃO GLOBAL - DESATIVA ANIMAÇÕES E ATIVA LABELS
        Chart.register(ChartDataLabels);
        Chart.defaults.animation = false; // Desativa animação de "queda"
        Chart.defaults.maintainAspectRatio = false;

        const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT4QgrRy659Pt4wBgeT987bFhfwSjnESxNSHJ-OWOZ_yxEu8mWmvWYdUH5Y-4EjowJspxOv9b4gkSB0/pub?output=csv';
        
        let db = [];
        let filtered = [];
        let charts = {};

        async function init() {
            try {
                const response = await fetch(SHEET_CSV);
                const csv = await response.text();
                db = parseData(csv);
                
                const dates = db.map(d => d.isoDate).filter(d => d);
                document.getElementById('date-start').value = dates.sort()[0];
                document.getElementById('date-end').value = dates.sort().reverse()[0];

                filtered = [...db];
                setupFilters();
                renderAll();
                
                document.getElementById('loading').classList.add('hidden');
                lucide.createIcons();
            } catch (err) {
                console.error(err);
            }
        }

        function parseData(csv) {
            const lines = csv.split(/\r?\n/);
            const data = [];
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(/[,;]/).map(c => c.replace(/^"|"$/g, '').trim());
                if (cols.length < 8 || !cols[1]) continue;
                const dP = cols[1].split('/');
                const isoDate = `${dP[2]}-${dP[1]}-${dP[0]}`;
                data.push({
                    displayDate: cols[1], isoDate: isoDate, hub: cols[4],
                    carrier: cols[6], profile: cols[7], qty: parseInt(cols[8]) || 0
                });
            }
            return data.sort((a, b) => new Date(a.isoDate) - new Date(b.isoDate));
        }

        function setupFilters() {
            const createOptions = (id, key) => {
                const items = [...new Set(db.map(d => d[key]))].sort();
                const select = document.getElementById(id);
                items.forEach(i => {
                    const opt = document.createElement('option');
                    opt.value = i; opt.textContent = i;
                    select.appendChild(opt);
                });
                select.addEventListener('change', runFilters);
            };
            createOptions('f-hub', 'hub');
            createOptions('f-carrier', 'carrier');
            createOptions('f-profile', 'profile');
            document.getElementById('date-start').addEventListener('change', runFilters);
            document.getElementById('date-end').addEventListener('change', runFilters);
            document.getElementById('mainSearch').addEventListener('input', renderTable);
        }

        function runFilters() {
            const start = document.getElementById('date-start').value;
            const end = document.getElementById('date-end').value;
            const h = document.getElementById('f-hub').value;
            const c = document.getElementById('f-carrier').value;
            const p = document.getElementById('f-profile').value;

            filtered = db.filter(i => {
                const dateMatch = (!start || i.isoDate >= start) && (!end || i.isoDate <= end);
                return dateMatch && (h === 'all' || i.hub === h) && (c === 'all' || i.carrier === c) && (p === 'all' || i.profile === p);
            });
            renderAll();
        }

        function groupSum(data, key) {
            return data.reduce((acc, curr) => {
                acc[curr[key]] = (acc[curr[key]] || 0) + curr.qty;
                return acc;
            }, {});
        }

        function createChart(id, type, labels, data, color, customOptions = {}) {
            if (charts[id]) charts[id].destroy();
            const ctx = document.getElementById(id).getContext('2d');
            
            charts[id] = new Chart(ctx, {
                type: type,
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: color,
                        borderRadius: 10,
                        borderWidth: 0,
                        tension: 0,
                        pointRadius: 6,
                        pointBackgroundColor: '#ee4d2d'
                    }]
                },
                options: {
                    layout: { padding: { top: 35, bottom: 10, left: 10, right: 10 } }, // Padding para o label não sumir
                    plugins: {
                        legend: { display: type === 'doughnut', position: 'bottom' },
                        datalabels: {
                            display: true,
                            color: '#1f2937',
                            font: { weight: '900', size: 16 },
                            anchor: 'end',
                            align: 'top',
                            offset: 5,
                            formatter: (val, ctx) => {
                                if (type === 'doughnut') {
                                    let sum = ctx.dataset.data.reduce((a, b) => a + b, 0);
                                    return ((val * 100) / sum).toFixed(1) + "%";
                                }
                                return val.toLocaleString();
                            }
                        }
                    },
                    scales: type === 'doughnut' ? {} : {
                        y: { display: false },
                        x: { grid: { display: false }, ticks: { font: { size: 10, weight: 'bold' } } }
                    },
                    ...customOptions
                }
            });
        }

        function renderAll() {
            const total = filtered.reduce((acc, c) => acc + c.qty, 0);
            document.getElementById('kpi-total').innerText = total.toLocaleString();

            // 1. Evolução
            const grpEv = {};
            filtered.forEach(i => grpEv[i.displayDate] = (grpEv[i.displayDate] || 0) + i.qty);
            createChart('chartEvolucao', 'line', Object.keys(grpEv), Object.values(grpEv), '#ee4d2d', {
                datasets: [{ data: Object.values(grpEv), borderColor: '#ee4d2d', borderWidth: 4, fill: false }]
            });

            // 2. Hubs
            const grpHub = Object.entries(groupSum(filtered, 'hub')).sort((a,b) => b[1]-a[1]).slice(0,8);
            createChart('chartHub', 'bar', grpHub.map(x=>x[0]), grpHub.map(x=>x[1]), '#ee4d2d');

            // 3. Carrier
            const grpCa = Object.entries(groupSum(filtered, 'carrier')).sort((a,b) => b[1]-a[1]).slice(0,8);
            createChart('chartCarrier', 'bar', grpCa.map(x=>x[0]), grpCa.map(x=>x[1]), '#1f2937');

            // 4. Perfis
            const grpPf = Object.entries(groupSum(filtered, 'profile')).sort((a,b) => b[1]-a[1]).slice(0,5);
            createChart('chartPerfis', 'doughnut', grpPf.map(x=>x[0]), grpPf.map(x=>x[1]), ['#ee4d2d', '#1f2937', '#ff7337', '#94a3b8', '#cbd5e1'], {
                layout: { padding: 40 }
            });

            renderTable();
        }

        function renderTable() {
            const body = document.getElementById('fleetTableBody');
            const s = document.getElementById('mainSearch').value.toLowerCase();
            const rows = filtered.filter(f => f.hub.toLowerCase().includes(s) || f.carrier.toLowerCase().includes(s)).slice(0, 30);
            body.innerHTML = rows.map(r => `
                <tr class="hover:bg-orange-50/50">
                    <td class="px-10 py-5 text-xs text-slate-400">${r.displayDate}</td>
                    <td class="px-10 py-5 text-slate-900">${r.hub}</td>
                    <td class="px-10 py-5">${r.carrier}</td>
                    <td class="px-10 py-5 text-[10px] uppercase">${r.profile}</td>
                    <td class="px-10 py-5 text-right text-orange-600 text-lg font-black">${r.qty}</td>
                </tr>
            `).join('');
        }

        window.onload = init;
    </script>
</body>
</html>
